# Root-level workspace tasks
# These tasks operate on the entire workspace, not individual projects
# https://moonrepo.dev/docs/config/project
language: 'rust'
type: 'application'
tasks:
  # Format entire workspace
  format:
    command: 'treefmt'
    inputs:
      - 'treefmt.toml'
      - '.git/**/*'
      - '**/*.rs'
      - '**/*.nix'
      - '**/*.sh'
      - '**/*.{js,jsx,ts,tsx,json}'
      - '**/*.{yml,yaml}'
      - '**/*.toml'
      - '.github/workflows/*.yml'
    options:
      cache: false
  # Audit workspace dependencies
  audit:
    command: 'cargo'
    args: ['audit', '--ignore', 'RUSTSEC-2023-0071', '--ignore', 'RUSTSEC-2024-0436', '--ignore', 'RUSTSEC-2024-0445']
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
  # Check documentation
  check-docs:
    command: 'bash'
    args: ['-c', 'RUSTDOCFLAGS="" cargo doc --all-features --no-deps 2>&1 | tee log/docs-warnings.log | grep -E "(warning|error|Documenting|Finished)" || true && cargo clippy --lib --all-features -- -D warnings -W clippy::missing_docs_in_private_items']
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**/*.rs'
  # Integration tests: forge new then run template bin/test-integration
  test-integration:
    command: 'bash'
    args: ['bin/test-integration']
    inputs:
      - 'bin/test-integration'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**/*.rs'
      - 'crates/forge-cli/templates/**/*'
  # E2E tests: forge new then run template bin/test-e2e (Playwright in templates/default/test/e2e)
  test-e2e:
    command: 'bash'
    args: ['bin/test-e2e']
    inputs:
      - 'bin/test-e2e'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**/*.rs'
      - 'crates/forge-cli/templates/**/*'
  # Monorepo check (tsgo + Biome at root)
  check:
    deps: ['~:format']
    command: 'bun'
    args: ['run', 'check']
    inputs:
      - 'package.json'
      - 'bun.lock'
      - 'biome.json'
      - 'tsconfig.json'
      - 'packages/**/*.ts'
      - 'packages/**/*.tsx'
  # Monorepo unit tests (root); runs after check; only *.test.* (excludes Playwright .spec.ts)
  test:
    deps: ['~:check']
    command: 'bun'
    args: ['test', '.test.']
    inputs:
      - 'package.json'
      - 'bun.lock'
      - 'packages/**/*.ts'
      - 'packages/**/*.tsx'
      - '**/*.test.ts'
      - '**/*.test.tsx'
