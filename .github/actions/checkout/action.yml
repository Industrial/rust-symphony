# Reusable checkout with configurable fetch-depth (e.g. full history for PRs).
name: "Checkout"
description: "Checkout repo with optional full history for PRs"
inputs:
  fetch-depth:
    description: "Fetch depth (0 = full history). Use 0 for PRs when moon --affected is needed."
    required: false
    default: "1"
outputs: {}
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: ${{ inputs.fetch-depth }}
