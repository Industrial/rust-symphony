name: 🚀 Release & Publish
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-*" # v1.2.3-beta.1
# Only one release at a time
concurrency:
  group: release
  cancel-in-progress: false
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Build optimization: sccache for compilation caching
  RUSTC_WRAPPER: sccache
jobs:
  # =============================================================================
  # VALIDATE
  # =============================================================================
  validate:
    name: 🔍 Validate Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

          if [[ "${TAG}" == *"-"* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "📦 Prerelease version: ${TAG}"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "📦 Release version: $TAG"
          fi
      - name: Verify version matches Cargo.toml
        run: |
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | cut -d '"' -f 2)
          TAG_VERSION="${{ steps.version.outputs.version }}"

          echo "📋 Tag version: $TAG_VERSION"
          echo "📋 Cargo.toml version: $CARGO_VERSION"

          if [[ "$CARGO_VERSION" != "$TAG_VERSION" ]]; then
            echo "❌ Version mismatch!"
            echo "   Tag: v$TAG_VERSION"
            echo "   Cargo.toml: $CARGO_VERSION"
            exit 1
          fi

          echo "✅ Versions match!"
  # =============================================================================
  # BUILD & TEST (run full CI workflow; same as main/PR CI)
  # =============================================================================
  build:
    name: 🔨 Build & Test (CI)
    needs: validate
    uses: ./.github/workflows/ci.yml
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write
  security:
    name: 🔐 Security
    needs: validate
    uses: ./.github/workflows/security.yml
    secrets: inherit
    permissions:
      contents: read
      security-events: write
      actions: read
  # Release-only: build release binary (symphony CLI from symphony-runner crate).
  # We do not run `cargo publish --dry-run` here: symphony-runner depends on workspace
  # crates (symphony-agent, etc.) that are not on crates.io, so publish would fail until
  # all are published in dependency order. GitHub Release + binary uploads work without crates.io.
  build-release:
    name: 📦 Release binary
    runs-on: ubuntu-latest
    needs: [validate, build, security]
    permissions:
      contents: read
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-nix-devenv
      - uses: ./.github/actions/setup-sccache
      - uses: ./.github/actions/setup-moon
      - name: Build release binary
        env:
          MOON_TOOLCHAIN_FORCE_GLOBALS: rust
        run: devenv shell -- cargo build --release -p symphony-runner --bin symphony
      - uses: ./.github/actions/sccache-stats
  # =============================================================================
  # PUBLISH TO CRATES.IO (optional; uncomment when all workspace crates are published)
  # =============================================================================
  # publish:
  #   name: 📤 Publish to crates.io
  #   runs-on: ubuntu-latest
  #   needs: [validate, build, build-release]
  #   ...
  # =============================================================================
  # CREATE GITHUB RELEASE
  # =============================================================================
  release:
    name: 🎉 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, build-release]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          {
            echo "## What's Changed"
            echo ""
            if [[ -n "${PREV_TAG}" ]]; then
              echo "Changes since ${PREV_TAG}:"
              echo ""
              git log --pretty=format:"* %s (%h)" "${PREV_TAG}"..HEAD
            else
              echo "Initial release! 🎉"
            fi
            echo ""
            echo ""
            echo "---"
            echo ""
          } > CHANGELOG.md
          {
            echo "📦 **Install the CLI (one-liner):**"
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/Industrial/rust-symphony/main/install.sh | sh"
            echo '```'
            echo ""
            echo "Optional: \`SYMPHONY_VERSION=vX.Y.Z\` to pin version; \`SYMPHONY_INSTALL_DIR=/path\` to set install directory."
            echo ""
            echo "📦 **Or with cargo:** \`cargo install symphony-runner\`"
            echo ""
            echo "📚 **Documentation:** See [README](https://github.com/Industrial/rust-symphony#readme)"
          } >> CHANGELOG.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.validate.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ needs.validate.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          make_latest: ${{ needs.validate.outputs.is_prerelease != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # =============================================================================
  # BUILD & UPLOAD RELEASE BINARIES
  # =============================================================================
  build-binaries:
    name: 📦 Binaries (${{ matrix.target }})
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      # Binaries job does not use setup-sccache; avoid inheriting RUSTC_WRAPPER
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: symphony
          package: symphony-runner
          target: ${{ matrix.target }}
          archive: symphony-runner-${{ github.ref_name }}-${{ matrix.target }}
          tar: unix
          token: ${{ secrets.GITHUB_TOKEN }}
  # =============================================================================
  # PUBLISH DOCUMENTATION (same Nix/devenv as CI)
  # =============================================================================
  docs:
    name: 📚 Publish Documentation
    runs-on: ubuntu-latest
    needs: [validate, release]
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix-devenv
      - uses: ./.github/actions/setup-sccache
      - uses: ./.github/actions/setup-moon
      - name: Generate documentation
        run: |
          echo "📚 Generating documentation..."
          devenv shell -- cargo doc --all-features --no-deps
      - uses: ./.github/actions/sccache-stats
  # =============================================================================
  # RELEASE COMPLETE
  # =============================================================================
  notify:
    name: 📢 Release Complete
    runs-on: ubuntu-latest
    needs: [validate, release, docs]
    if: always()
    steps:
      - name: Check release status
        run: |
          if [[ "${{ needs.release.result }}" != "success" ]]; then
            echo "❌ Release failed at release step"
            exit 1
          fi

          echo "🎉 symphony-runner v${{ needs.validate.outputs.version }} released!"
          echo ""
          echo "📦 Install: curl -fsSL https://raw.githubusercontent.com/Industrial/rust-symphony/main/install.sh | sh"
          echo "📦 crates.io: https://crates.io/crates/symphony-runner/${{ needs.validate.outputs.version }}"
