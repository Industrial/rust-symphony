# Root-level workspace tasks
# These tasks operate on the entire workspace, not individual projects
# https://moonrepo.dev/docs/config/project
id: 'rust-symphony'
language: 'rust'
layer: 'application'
# Don't inherit check/test from rust.yml — those run per-crate only
workspace:
  inheritedTasks:
    exclude:
      - check
      - test
tasks:
  # Format entire workspace
  format:
    command: 'treefmt'
    inputs:
      - 'treefmt.toml'
      - '.git/**/*'
      - '**/*.rs'
      - '**/*.nix'
      - '**/*.sh'
      - '**/*.{js,jsx,ts,tsx,json}'
      - '**/*.{yml,yaml}'
      - '**/*.toml'
      - '.github/workflows/*.yml'
    options:
      cache: false
      outputStyle: buffer-only-failure
  # Audit workspace dependencies
  audit:
    command: 'cargo'
    args: ['audit', '--ignore', 'RUSTSEC-2023-0071', '--ignore', 'RUSTSEC-2024-0436', '--ignore', 'RUSTSEC-2024-0445']
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
    options:
      outputStyle: buffer-only-failure
  # Run all workspace tests via cargo-nextest (faster, better parallelism)
  test-nextest:
    command: 'cargo'
    args: ['nextest', 'run']
    deps: ['~:format']
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
  # Code coverage via cargo-llvm-cov; thresholds and packages in bin/test-coverage
  test-coverage:
    command: 'bash'
    args: ['bin/test-coverage']
    deps: ['~:format']
    inputs:
      - 'bin/test-coverage'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/symphony-agent/**/*.rs'
      - 'crates/symphony-domain/**/*.rs'
    options:
      cache: false
      outputStyle: buffer-only-failure
  # Check documentation
  check-docs:
    command: 'bash'
    args: ['-c', 'RUSTDOCFLAGS="" cargo doc --all-features --no-deps 2>&1 | tee log/docs-warnings.log | grep -E "(warning|error|Documenting|Finished)" || true && cargo clippy --lib --all-features -- -D warnings -W clippy::missing_docs_in_private_items']
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**/*.rs'
    options:
      outputStyle: buffer-only-failure
  # Inline WORKFLOW.md into README between markers (single source of truth: WORKFLOW.md)
  inline-workflow:
    command: 'bash'
    args: ['scripts/inline-workflow-into-readme.sh']
    inputs:
      - 'WORKFLOW.md'
      - 'README.md'
      - 'scripts/inline-workflow-into-readme.sh'
    options:
      cache: false
  # Verify README is in sync with WORKFLOW.md (fails if running inline-workflow would change README)
  check-inline-workflow:
    command: 'bash'
    args: ['scripts/inline-workflow-into-readme.sh', '--check']
    inputs:
      - 'WORKFLOW.md'
      - 'README.md'
      - 'scripts/inline-workflow-into-readme.sh'
    options:
      cache: false

