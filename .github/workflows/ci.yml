name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
permissions:
  contents: read
jobs:
  ci:
    name: CI (checks → integration → e2e)
    runs-on: ubuntu-latest
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-nix-devenv
        with:
          cachix-cache-name: "rust-symphony"
      - uses: ./.github/actions/setup-sccache
      - uses: ./.github/actions/setup-mold
      - uses: ./.github/actions/setup-moon
      - name: Run checks
        uses: ./.github/actions/run-devenv-moon
        with:
          targets: ":format :check :build :test :audit :check-docs"
          use-affected: "true"
      - name: Run coverage
        shell: bash
        env:
          MOON_TOOLCHAIN_FORCE_GLOBALS: rust
        run: |
          unset MOON_BASE MOON_HEAD
          devenv shell -- moon run :coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/llvm-cov/html
          retention-days: 7
      - name: Upload coverage to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/llvm-cov/html
      - uses: ./.github/actions/sccache-stats
  # Deploys coverage HTML to GitHub Pages. Enable in repo: Settings → Pages → Source: GitHub Actions.
  deploy-pages:
    name: Deploy coverage to GitHub Pages
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Add report link to summary
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          {
            echo "### Coverage report"
            echo ""
            echo "**[View coverage report](https://${OWNER}.github.io/${REPO}/)**"
          } >> "$GITHUB_STEP_SUMMARY"
