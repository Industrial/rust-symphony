# Moon project config for symphony-runner (orchestrator daemon binary).
language: 'rust'
layer: 'application'
tasks:
  check:
    deps: ['rust-symphony:format']
    description: 'Run cargo check for the crate'
    command: 'cargo'
    args: ['check']
    inputs:
      - 'Cargo.toml'
      - '/Cargo.lock'
      - 'src/**/*'
    options:
      cache: true
      outputStyle: buffer-only-failure
  test:
    description: 'Run cargo nextest for the crate'
    command: 'cargo'
    args: ['nextest', 'run']
    deps: ['check']
    inputs:
      - 'Cargo.toml'
      - '/Cargo.lock'
      - 'src/**/*'
      - 'tests/**/*'
    options:
      cache: true
      outputStyle: buffer-only-failure
