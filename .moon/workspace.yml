# https://moonrepo.dev/docs/config/workspace
$schema: './cache/schemas/workspace.json'
# extends: './shared/workspace.yml'

# Never hash build outputs—only source and config. Avoids warnings when target/
# is cleaned or incremental artifacts are missing.
hasher:
  ignorePatterns:
    - '**/target/**'
# Rust workspace crates
projects:
  - 'crates/*'
  # Template crates (for testing template before generation)
  - 'crates/forge-cli/templates/default/crates/*'
  # Template root (for workspace-wide template tasks)
  - 'crates/forge-cli/templates/default'
  # Root workspace project for workspace-wide tasks
  - '.'
vcs:
  manager: 'git'
  defaultBranch: 'main'
