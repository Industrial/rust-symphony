# Run cargo-audit and cargo-deny. Expects Rust toolchain and rust-cache already set up.
name: "Security Rust audit"
description: "Run cargo-audit and cargo-deny"
inputs:
  audit-allow:
    description: "Advisory ID to allow (matches deny.toml); empty = none"
    required: false
    default: "RUSTSEC-2023-0071"
outputs: {}
runs:
  using: "composite"
  steps:
    - name: Install cargo-audit
      shell: bash
      run: cargo install cargo-audit
    - name: Run cargo-audit
      shell: bash
      env:
        AUDIT_ALLOW: ${{ inputs.audit-allow }}
      run: |
        if [ -n "$AUDIT_ALLOW" ]; then
          cargo audit --allow "$AUDIT_ALLOW"
        else
          cargo audit
        fi
    - name: Install cargo-deny
      shell: bash
      run: cargo install cargo-deny
    - name: Run cargo-deny
      shell: bash
      run: cargo deny check
