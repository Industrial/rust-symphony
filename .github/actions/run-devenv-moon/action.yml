# Run moon targets inside devenv shell, with optional --affected for PRs.
name: "Run devenv moon"
description: "Run moon commands in devenv (optionally --affected on PRs)"
inputs:
  targets:
    description: "Space-separated moon targets (e.g. ':format :check :lint')"
    required: true
  use-affected:
    description: "If true, use --affected on pull_request"
    required: false
    default: "true"
outputs: {}
runs:
  using: "composite"
  steps:
    - name: Run moon (devenv)
      shell: bash
      env:
        MOON_TOOLCHAIN_FORCE_GLOBALS: rust
        # Only set base/head when using --affected; otherwise moon requires --affected and fails.
        MOON_BASE: ${{ github.event_name == 'pull_request' && inputs.use-affected == 'true' && github.event.pull_request.base.sha || '' }}
        MOON_HEAD: ${{ github.event_name == 'pull_request' && inputs.use-affected == 'true' && github.sha || '' }}
        EVENT_NAME: ${{ github.event_name }}
        USE_AFFECTED: ${{ inputs.use-affected }}
        TARGETS: ${{ inputs.targets }}
      run: |
        set -euo pipefail
        # Use --affected only on PR when base/head are set (moon requires both for --affected)
        if [ "$EVENT_NAME" = "pull_request" ] && [ "$USE_AFFECTED" = "true" ] && [ -n "${MOON_BASE:-}" ] && [ -n "${MOON_HEAD:-}" ]; then
          devenv shell -- moon run --affected $TARGETS
        else
          devenv shell -- moon run $TARGETS
        fi
