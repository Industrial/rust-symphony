# Install moon and optionally restore/cache .moon/cache.
name: "Setup moon"
description: "Install moon and optionally cache"
inputs:
  cache:
    description: "Whether to use actions/cache for .moon/cache"
    required: false
    default: "true"
outputs: {}
runs:
  using: "composite"
  steps:
    - name: Install moon
      shell: bash
      run: |
        curl -fsSL https://moonrepo.dev/install/moon.sh | bash
        echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
        echo "PATH=$HOME/.moon/bin:$PATH" >> "$GITHUB_ENV"
        export PATH="$HOME/.moon/bin:$PATH"
        moon --version
    - name: Cache moon
      if: inputs.cache == 'true'
      uses: actions/cache@v4
      with:
        path: .moon/cache
        key: moon-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
        restore-keys: |
          moon-${{ runner.os }}-
