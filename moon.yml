# Root-level workspace tasks
# These tasks operate on the entire workspace, not individual projects
# https://moonrepo.dev/docs/config/project
id: 'rust-symphony'
language: 'rust'
layer: 'application'
# Don't inherit check/test from rust.yml — those run per-crate only
workspace:
  inheritedTasks:
    exclude:
      - check
      - test
tasks:
  # Format entire workspace
  format:
    description: 'Format the workspace with treefmt (Rust, Nix, shell, JS/TS, YAML, TOML)'
    command: 'treefmt'
    inputs:
      - 'treefmt.toml'
      - '.git/**/*'
      - '**/*.rs'
      - '**/*.nix'
      - '**/*.sh'
      - '**/*.{js,jsx,ts,tsx,json}'
      - '**/*.{yml,yaml}'
      - '**/*.toml'
      - '.github/workflows/*.yml'
    options:
      cache: false
      outputStyle: buffer-only-failure
  # Audit workspace dependencies
  audit:
    description: 'Run cargo audit for known Rust security advisories'
    command: 'cargo'
    args: ['audit', '--ignore', 'RUSTSEC-2023-0071', '--ignore', 'RUSTSEC-2024-0436', '--ignore', 'RUSTSEC-2024-0445']
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
    options:
      outputStyle: buffer-only-failure
  # Test coverage with llvm-cov (run nextest under coverage, output HTML report)
  coverage:
    description: 'Run tests with llvm-cov and generate HTML coverage report'
    command: 'cargo'
    args: ['llvm-cov', 'nextest', '--html', '--output-dir', 'target/llvm-cov/html']
    deps: ['~:format']
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**/*.rs'
    options:
      cache: false
      outputStyle: buffer-only-failure
  # Check documentation
  check-docs:
    description: 'Build docs and run clippy with missing_docs_in_private_items'
    command: 'bash'
    args: ['-c', 'RUSTDOCFLAGS="" cargo doc --all-features --no-deps 2>&1 | tee log/docs-warnings.log | grep -E "(warning|error|Documenting|Finished)" || true && cargo clippy --lib --all-features -- -D warnings -W clippy::missing_docs_in_private_items']
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**/*.rs'
    options:
      outputStyle: buffer-only-failure
