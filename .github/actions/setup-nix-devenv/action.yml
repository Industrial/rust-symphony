# Install Nix, configure Cachix (single cache; push only from main), and install devenv.
name: "Setup Nix devenv"
description: "Setup Nix and Cachix; push to cache only when allow-cache-push is true (e.g. main branch)"
inputs:
  cachix-cache-name:
    description: "Cachix cache name. If empty, Cachix step is skipped."
    required: false
    default: "rust-symphony"
  allow-cache-push:
    description: "If true, push to Cachix (set to true only on main branch push). PRs and other branches should use false."
    required: false
    default: "false"
outputs: {}
runs:
  using: "composite"
  steps:
    - uses: DeterminateSystems/nix-installer-action@main
    - name: Setup Cachix
      if: inputs.cachix-cache-name != ''
      uses: cachix/cachix-action@v16
      with:
        name: ${{ inputs.cachix-cache-name }}
        # Only pass authToken when pushing (main); otherwise the action tries to start the push daemon and fails in CI.
        authToken: ${{ inputs.allow-cache-push == 'true' && env.CACHIX_AUTH_TOKEN }}
        skipPush: ${{ inputs.allow-cache-push != 'true' }}
    - name: Install devenv 2.x
      shell: bash
      run: nix profile install github:cachix/devenv#default
